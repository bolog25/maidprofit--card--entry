<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Complete</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h2 { color: #1d1d1f; font-size: 22px; margin: 0 0 10px 0; }
    .subtitle { color: #6e6e73; font-size: 15px; line-height: 1.5; margin: 0; }
    .note { color: #aeaeb2; font-size: 13px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x2705;</div>
    <h2>Stripe Setup Complete</h2>
    <p class="subtitle">Your account has been connected successfully.</p>
    <p class="note">You can close this page and return to MaidProfit.</p>
  </div>
</body>
</html>
